<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Silabus Kursus Bahasa Linguo.id</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f9f7;--bg-primary:#fff;--bg-secondary:#f4f4f2;--bg-tertiary:#eeecea;
  --text:#1a1a1a;--text-2:#555;--text-3:#999;
  --border:rgba(0,0,0,0.11);--border-2:rgba(0,0,0,0.22);
  --radius:8px;--radius-lg:12px;
  --accent:#185FA5;--accent-bg:#E6F1FB;
}
[data-theme="dark"]{
  --bg:#111110;--bg-primary:#1c1c1a;--bg-secondary:#252523;--bg-tertiary:#2e2e2b;
  --text:#f0ede8;--text-2:#a0a09a;--text-3:#606058;
  --border:rgba(255,255,255,0.09);--border-2:rgba(255,255,255,0.18);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}
.app{padding:1.5rem 1rem 5rem;max-width:980px;margin:0 auto}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.logo{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.logo-brand{color:var(--text)}.logo-id{color:#2ABFBF}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-icon{background:var(--bg-primary);border:0.5px solid var(--border-2);border-radius:var(--radius);padding:6px 12px;font-size:13px;cursor:pointer;color:var(--text-2);font-family:inherit;transition:all .15s}
.btn-icon:hover{color:var(--text);background:var(--bg-secondary)}
.lang-btn{display:flex;align-items:center;gap:6px}

/* LANGUAGE SELECTOR */
.lang-selector-wrap{position:relative}
.lang-dropdown{position:absolute;top:calc(100% + 6px);right:0;width:340px;background:var(--bg-primary);border:0.5px solid var(--border-2);border-radius:var(--radius-lg);box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:200;padding:12px;max-height:480px;overflow:hidden;display:none}
.lang-dropdown.open{display:block}
.lang-search{width:100%;padding:7px 10px;border:0.5px solid var(--border-2);border-radius:var(--radius);background:var(--bg-secondary);color:var(--text);font-size:13px;font-family:inherit;margin-bottom:10px;outline:none}
.lang-group-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;padding:6px 4px 4px;display:block}
.lang-scroll{max-height:360px;overflow-y:auto;padding-right:2px}
.lang-scroll::-webkit-scrollbar{width:4px}
.lang-scroll::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:4px}
.lang-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--radius);cursor:pointer;transition:background .1s;font-size:13px;color:var(--text)}
.lang-item:hover{background:var(--bg-secondary)}
.lang-item.active{background:var(--accent-bg);color:#042C53;font-weight:500}
[data-theme="dark"] .lang-item.active{background:#0c2744;color:#85B7EB}
.lang-flag{font-size:16px;width:22px;text-align:center}
.lang-name{flex:1}
.lang-native{font-size:11px;color:var(--text-3)}
.lang-badge{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--bg-tertiary);color:var(--text-3)}
.lang-badge.new{background:#EAF3DE;color:#3B6D11}
[data-theme="dark"] .lang-badge.new{background:#1a3a1a;color:#97C459}

/* HEADER */
.cur-header{margin-bottom:1.5rem}
.cur-title{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.cur-flag{font-size:28px}
.cur-name{font-size:22px;font-weight:600;color:var(--text)}
.cur-desc{font-size:14px;color:var(--text-2)}
.cur-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.stat-chip{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);color:var(--text-3);background:var(--bg-secondary)}

/* LEVEL TABS */
.level-tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.level-tab{padding:8px 18px;border-radius:var(--radius);border:0.5px solid var(--border-2);font-size:14px;font-weight:500;cursor:pointer;background:var(--bg-primary);color:var(--text);transition:all .15s;font-family:inherit}
.level-tab:hover{background:var(--bg-secondary)}
.level-tab.act-A1{background:#FAECE7;border-color:#D85A30;color:#712B13}
.level-tab.act-A2{background:#FAEEDA;border-color:#BA7517;color:#412402}
.level-tab.act-B1{background:#EAF3DE;border-color:#3B6D11;color:#173404}
.level-tab.act-B2{background:#E6F1FB;border-color:#185FA5;color:#042C53}
[data-theme="dark"] .level-tab.act-A1{background:#3a1508;border-color:#D85A30;color:#F0997B}
[data-theme="dark"] .level-tab.act-A2{background:#2e1e04;border-color:#BA7517;color:#FAC775}
[data-theme="dark"] .level-tab.act-B1{background:#0e2205;border-color:#3B6D11;color:#97C459}
[data-theme="dark"] .level-tab.act-B2{background:#031828;border-color:#185FA5;color:#85B7EB}

/* SUBLEVEL */
.sublevel-row{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.sub-btn{padding:6px 14px;border-radius:var(--radius);border:0.5px solid var(--border);font-size:13px;cursor:pointer;background:var(--bg-secondary);color:var(--text-2);transition:all .15s;font-family:inherit}
.sub-btn:hover{color:var(--text);border-color:var(--border-2)}
.sub-btn.act-A1{background:#FAECE7;border-color:#D85A30;color:#712B13;font-weight:500}
.sub-btn.act-A2{background:#FAEEDA;border-color:#BA7517;color:#633806;font-weight:500}
.sub-btn.act-B1{background:#EAF3DE;border-color:#3B6D11;color:#27500A;font-weight:500}
.sub-btn.act-B2{background:#E6F1FB;border-color:#185FA5;color:#0C447C;font-weight:500}
[data-theme="dark"] .sub-btn.act-A1{background:#3a1508;border-color:#D85A30;color:#F0997B}
[data-theme="dark"] .sub-btn.act-A2{background:#2e1e04;border-color:#BA7517;color:#FAC775}
[data-theme="dark"] .sub-btn.act-B1{background:#0e2205;border-color:#3B6D11;color:#97C459}
[data-theme="dark"] .sub-btn.act-B2{background:#031828;border-color:#185FA5;color:#85B7EB}

/* META */
.meta-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.meta-chip{font-size:12px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);color:var(--text-3);background:var(--bg-secondary)}

/* SESSION GRID */
.sessions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:1.5rem}
.session-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.session-card:hover{border-color:var(--border-2)}
.session-num{font-size:11px;color:var(--text-3);margin-bottom:4px;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.session-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px}
.session-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;border:0.5px solid var(--border);color:var(--text-3)}

/* DETAIL PANEL */
.detail-panel{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-top:8px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.dp-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem}
.dp-title{font-size:16px;font-weight:600;color:var(--text)}
.dp-num{font-size:12px;color:var(--text-3);margin-bottom:4px}
.dp-close{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:18px;line-height:1;padding:0 4px}
.dp-close:hover{color:var(--text)}
.dp-section{margin-bottom:1rem}
.dp-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:6px}
.dp-content{font-size:14px;color:var(--text-2);line-height:1.65}
.dp-list{list-style:none;display:flex;flex-direction:column;gap:4px}
.dp-list li{font-size:13px;color:var(--text-2);padding-left:14px;position:relative;line-height:1.5}
.dp-list li::before{content:"·";position:absolute;left:2px;color:var(--text-3)}
.dp-objectives{background:var(--bg-secondary);border-radius:var(--radius);padding:12px 14px;margin-bottom:1rem}
.dp-row{display:flex;gap:1rem;margin-bottom:8px;font-size:14px}
.dp-row-label{color:var(--text-3);min-width:110px;font-size:13px}
.dp-row-val{color:var(--text-2);font-size:13px}
.prog-wrap{background:var(--bg-secondary);border-radius:99px;height:5px;flex:1;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;transition:width .3s}
.bar-A1{background:#D85A30}.bar-A2{background:#BA7517}.bar-B1{background:#3B6D11}.bar-B2{background:#185FA5}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:150;display:none}
.overlay.open{display:block}

/* COPYRIGHT */
.copyright{position:fixed;bottom:10px;right:14px;font-size:11px;color:var(--text-3);pointer-events:none;letter-spacing:.02em}
/* SCROLL TO TOP */
.scroll-top{position:fixed;bottom:44px;right:14px;width:36px;height:36px;border-radius:50%;background:var(--bg-primary);border:0.5px solid var(--border-2);color:var(--text-2);font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:all .2s;z-index:100}
.scroll-top.visible{display:flex}
.scroll-top:hover{background:#2ABFBF;color:#fff;border-color:#2ABFBF}
/* VOCAB GRID */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-top:6px}
.vocab-pill{background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12.5px;color:var(--text)}
.vocab-native{font-size:11px;color:var(--text-3);display:block;margin-top:1px}
/* GRAMMAR BOX */
.grammar-box{background:linear-gradient(135deg,rgba(42,191,191,.08),rgba(42,191,191,.03));border:0.5px solid rgba(42,191,191,.35);border-radius:var(--radius);padding:10px 13px;margin-top:6px}
.grammar-box .grammar-rule{font-size:13px;color:var(--text-2);line-height:1.7}
.grammar-box code{background:rgba(42,191,191,.15);color:#1a9090;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px}
[data-theme="dark"] .grammar-box code{color:#5DDBDB}
/* LANG SCRIPT BADGE */
.lang-script-badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:20px;background:rgba(42,191,191,.12);color:#1a9090;border:0.5px solid rgba(42,191,191,.3);margin-left:6px;vertical-align:middle}
[data-theme="dark"] .lang-script-badge{color:#5DDBDB}

/* MOBILE-RESPONSIVE */
@media(max-width:768px){
  .app{padding:1rem 0.75rem 5rem}
  .topbar{gap:8px;margin-bottom:1.25rem}
  .logo{font-size:16px}
  .topbar-right{width:100%;justify-content:flex-end}
  .btn-icon{padding:5px 8px;font-size:12px}
  .lang-dropdown{width:calc(100vw - 2rem);right:-60px;max-height:70vh}
  .cur-header{margin-bottom:1rem}
  .cur-title{gap:8px}
  .cur-flag{font-size:24px}
  .cur-name{font-size:18px}
  .cur-desc{font-size:12px}
  .cur-stats{gap:4px}
  .stat-chip{font-size:10px;padding:3px 8px}
  .level-tabs{gap:4px;margin-bottom:1rem}
  .level-tab{padding:6px 10px;font-size:12px}
  .sublevel-row{gap:4px;margin-bottom:1rem}
  .sub-btn{padding:5px 10px;font-size:11px}
  .meta-bar{gap:4px;margin-bottom:1rem}
  .meta-chip{font-size:10px;padding:3px 7px}
  .sessions-grid{grid-template-columns:1fr;gap:8px}
  .session-card{padding:12px}
  .session-num{font-size:10px}
  .session-title{font-size:13px}
  .tag{font-size:10px;padding:1px 6px}
  .detail-panel{padding:1rem;margin-top:4px}
  .dp-title{font-size:14px}
  .dp-num{font-size:11px}
  .dp-label{font-size:10px}
  .dp-content{font-size:13px}
  .dp-list li{font-size:12px}
  .dp-objectives{padding:10px}
  .dp-row{flex-direction:column;gap:4px}
  .dp-row-label{min-width:auto}
  .vocab-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:4px}
  .vocab-pill{padding:4px 7px;font-size:11px}
  .vocab-native{font-size:10px}
  .grammar-box{padding:8px 10px}
  .grammar-box .grammar-rule{font-size:12px}
  .copyright{font-size:9px;right:8px;bottom:6px}
  .scroll-top{width:32px;height:32px;font-size:14px;bottom:36px;right:8px}
}
@media(max-width:380px){
  .app{padding:0.75rem 0.5rem 4.5rem}
  .logo{font-size:14px}
  .level-tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .level-tabs::-webkit-scrollbar{display:none}
  .level-tab{white-space:nowrap;flex-shrink:0}
  .sublevel-row{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .sublevel-row::-webkit-scrollbar{display:none}
  .sub-btn{white-space:nowrap;flex-shrink:0}
  .lang-dropdown{right:-20px;width:calc(100vw - 1rem)}
}

</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">Silabus Kursus Bahasa <span class="logo-brand">linguo<span class="logo-id">.id</span></span></div>
    <div class="topbar-right">
      <div class="lang-selector-wrap">
        <button class="btn-icon lang-btn" id="langPickerBtn" onclick="toggleLangDropdown()">
          <span id="curLangFlag">🇪🇸</span>
          <span id="curLangName">Spanish</span>
          <span>▾</span>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <input class="lang-search" id="langSearch" placeholder="Search language..." oninput="filterLangs()" />
          <div class="lang-scroll" id="langList"></div>
        </div>
      </div>
      <button class="btn-icon" id="uiLangBtn" onclick="toggleUILang()">🌐 ID</button>
      <button class="btn-icon" id="darkBtn" onclick="toggleDark()">🌙</button>
    </div>
  </div>
  <div class="overlay" id="overlay" onclick="closeLangDropdown()"></div>

  <div class="cur-header" id="curHeader"></div>
  <div class="level-tabs" id="levelTabs"></div>
  <div class="sublevel-row" id="sublevelRow"></div>
  <div class="meta-bar" id="metaBar"></div>
  <div class="sessions-grid" id="sessionsGrid"></div>
  <div id="detailPanel"></div>
</div>
<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Scroll to top">↑</button>
<div class="copyright">© linguo<span style="color:#2ABFBF">.id</span> 2026</div>

           activities_id:"Dialog dengan dan tanpa partikel, analisis nuansa perbedaannya.",activities_en:"Dialogue with and without particles, analyze nuance differences."},
          {title_id:"Partikel Akhir: 囉(lo3) 喎(wo3) 咋(zaa3) 添(tim1)",title_en:"Particles: 囉(lo3) 喎(wo3) 咋(zaa3) 添(tim1)",tags:["grammar","partikel"],

           topics_id:"囉(lo3): sudah jelas/tentu saja. 喎(wo3): baru tahu/berita baru. 咋(zaa3): hanya/saja. 添(tim1): juga/lagi. 係囉(hai6 lo3=tentu saja!), 佢走咗喎(keoi5 zau2 zo2 wo3=dia sudah pergi tuh—baru tahu!), 得咋(dak1 zaa3=hanya itu saja).",topics_en:"囉(lo3): obviously/as expected. 喎(wo3): new information/I just found out. 咋(zaa3): only/just. 添(tim1): also/even more. 係囉(hai6 lo3=obviously!), 佢走咗喎(keoi5 zau2 zo2 wo3=he left! [new info]), 得咋(dak1 zaa3=that's all).",

           activities_id:"Reaksi berita dengan partikel yang tepat, roleplay percakapan natural.",activities_en:"React to news with correct particles, natural conversation roleplay."},
          {title_id:"Negasi 唔(m4) & Pertanyaan Positif-Negatif",title_en:"Negation 唔(m4) & Positive-Negative Questions",tags:["grammar","negasi"],
           objectives_id:"Menggunakan 唔(m4) untuk negasi; membentuk pertanyaan positif-negatif khas Kanton.",objectives_en:"Use 唔(m4) for negation; form Cantonese-style positive-negative questions.",
           topics_id:"唔(m4=tidak) + verba/adjektiva: 唔食(m4 sik6=tidak makan), 唔靚(m4 leng3=tidak cantik). Pertanyaan A-唔-A: 係唔係?(hai6 m4 hai6?=ya atau tidak?), 好唔好?(hou2 m4 hou2?=baik atau tidak?), 去唔去?(heoi3 m4 heoi3?=pergi atau tidak?).",topics_en:"唔(m4=not) + verb/adjective: 唔食(m4 sik6=not eating), 唔靚(m4 leng3=not pretty). A-唔-A questions: 係唔係?(hai6 m4 hai6?=is it or not?), 好唔好?(hou2 m4 hou2?=good or not?), 去唔去?(heoi3 m4 heoi3?=going or not?).",

           activities_id:"Latihan tanya-jawab A-唔-A, skenario menawarkan makanan.",activities_en:"A-唔-A Q&A drills, food offering scenarios."},
          {title_id:"Kata Tanya Kanton",title_en:"Cantonese Question Words",tags:["grammar","pertanyaan"],

           topics_id:"邊個?(bin1 go3?=siapa?), 咩?(me1?=apa?), 點?(dim2?=bagaimana?), 幾時?(gei2 si4?=kapan?), 邊度?(bin1 dou6?=di mana?), 點解?(dim2 gaai2?=mengapa?), 幾多?(gei2 do1?=berapa?), 邊個人(bin1 go3 jan4=orang mana?).",topics_en:"邊個?(bin1 go3?=who?), 咩?(me1?=what?), 點?(dim2?=how?), 幾時?(gei2 si4?=when?), 邊度?(bin1 dou6?=where?), 點解?(dim2 gaai2?=why?), 幾多?(gei2 do1?=how many?).",

           objectives_id:"Menggunakan pengklasifikasi (measure words) yang wajib dalam bahasa Kanton.",objectives_en:"Use classifiers (measure words) mandatory in Cantonese.",
           topics_id:"個(go3=umum/orang): 一個人(jat1 go3 jan4=satu orang), 本(bun2=buku): 一本書(jat1 bun2 syu1=satu buku), 杯(bui1=gelas): 一杯茶(jat1 bui1 caa4=secangkir teh), 隻(zek3=hewan/tangan/kaki): 一隻貓(jat1 zek3 maau1=seekor kucing). Tanpa classifier = salah/kasar!",topics_en:"個(go3=general/person): 一個人(jat1 go3 jan4=one person), 本(bun2=books): 一本書(jat1 bun2 syu1=one book), 杯(bui1=cup): 一杯茶(jat1 bui1 caa4=one cup of tea), 隻(zek3=animals/hands): 一隻貓(jat1 zek3 maau1=one cat).",

          {title_id:"有(jau5) Ada/Punya & 冇(mou5) Tidak Ada",title_en:"有(jau5) Have/Exist & 冇(mou5) Don't Have",tags:["grammar","verba"],
           objectives_id:"Menggunakan 有(jau5=ada/punya) dan 冇(mou5=tidak ada/tidak punya) dalam berbagai konteks.",objectives_en:"Use 有(jau5=have/there is) and 冇(mou5=not have/there isn't) in various contexts.",
           topics_id:"有: 我有錢(ngo5 jau5 cin2=saya punya uang), 有冇?(jau5 mou5?=ada tidak?). 冇: 我冇時間(ngo5 mou5 si4 gaan3=saya tidak punya waktu). 冇(mou5) adalah NEGATIF dari 有, bukan 唔有! Cantonese 冇≠Mandarin 沒有(발음 berbeda).",topics_en:"有: 我有錢(ngo5 jau5 cin2=I have money), 有冇?(jau5 mou5?=have or not?). 冇: 我冇時間(ngo5 mou5 si4 gaan3=I have no time). 冇(mou5) is the NEGATIVE of 有, not 唔有! Cantonese 冇≠Mandarin 沒有(different pronunciation).",
           vocab_id:"有(jau5=ada/punya), 冇(mou5=tidak ada), 有冇?(jau5 mou5?=ada tidak?), 有錢(jau5 cin2=kaya), 冇時間(mou5 si4 gaan3=tidak punya waktu)",vocab_en:"有(jau5=have/exist), 冇(mou5=don't have), 有冇?(have or not?), 有錢(jau5 cin2=rich), 冇時間(mou5 si4 gaan3=no time)",
           activities_id:"Dialog tentang kepemilikan, situasi ada/tidak ada di pasar.",activities_en:"Possession dialogue, market availability situations."},
          {title_id:"Aspek 咗(zo2) — Completed",title_en:"Aspect Marker 咗(zo2) — Completed",tags:["grammar","aspek"],
           objectives_id:"Menggunakan 咗(zo2) untuk menyatakan aksi sudah selesai — pengganti 'past tense' dalam Kanton.",objectives_en:"Use 咗(zo2) to express completed action — Cantonese substitute for 'past tense'.",
           topics_id:"Verba + 咗(zo2) = sudah selesai. 我食咗飯(ngo5 sik6 zo2 faan6=saya sudah makan nasi), 佢去咗HK(dia sudah pergi ke HK), 我買咗(ngo5 maai5 zo2=saya sudah beli). Bukan perubahan bentuk verba, hanya tambah 咗!",topics_en:"Verb + 咗(zo2) = completed. 我食咗飯(ngo5 sik6 zo2 faan6=I've eaten rice), 佢去咗HK(she's gone to HK), 我買咗(ngo5 maai5 zo2=I've bought it). Not a verb change, just add 咗!",
           vocab_id:"食咗(sik6 zo2=sudah makan), 去咗(heoi3 zo2=sudah pergi), 買咗(maai5 zo2=sudah beli), 做咗(zou6 zo2=sudah buat), 返咗去(faan1 zo2 heoi3=sudah pulang)",vocab_en:"食咗(sik6 zo2=ate/have eaten), 去咗(heoi3 zo2=went/have gone), 買咗(maai5 zo2=bought), 做咗(zou6 zo2=have done), 返咗去(faan1 zo2 heoi3=have returned)",
           activities_id:"Menceritakan apa yang sudah dilakukan hari ini/kemarin.",activities_en:"Tell what you've done today/yesterday."},
          {title_id:"Aspek 緊(gan2) & 過(gwo3)",title_en:"Aspect Markers 緊(gan2) & 過(gwo3)",tags:["grammar","aspek"],
           objectives_id:"Menggunakan 緊(gan2=sedang berlangsung) dan 過(gwo3=pernah pengalaman).",objectives_en:"Use 緊(gan2=ongoing) and 過(gwo3=experiential) aspect markers.",
           topics_id:"緊(gan2) = sedang: 我食緊飯(ngo5 sik6 gan2 faan6=saya sedang makan). 過(gwo3) = pernah: 我去過日本(ngo5 heoi3 gwo3 jat6 bun2=saya pernah pergi ke Jepang). Bandingkan: 咗(selesai) vs 緊(berlangsung) vs 過(pernah)!",topics_en:"緊(gan2) = ongoing: 我食緊飯(ngo5 sik6 gan2 faan6=I'm eating). 過(gwo3) = experienced: 我去過日本(ngo5 heoi3 gwo3 jat6 bun2=I've been to Japan). Compare: 咗(completed) vs 緊(ongoing) vs 過(experienced)!",
           vocab_id:"食緊(sik6 gan2=sedang makan), 睇緊(tai2 gan2=sedang menonton), 去過(heoi3 gwo3=pernah pergi), 食過(sik6 gwo3=pernah makan)",vocab_en:"食緊(sik6 gan2=eating now), 睇緊(tai2 gan2=watching now), 去過(heoi3 gwo3=have been to), 食過(sik6 gwo3=have tried eating)",
           activities_id:"3 situasi: apa yang sedang/sudah/pernah dilakukan?",activities_en:"3 situations: what are you doing/have done/have experienced?"},
          {title_id:"Adjektiva & 好(hou2)",title_en:"Adjectives & 好(hou2)",tags:["grammar","adjektiva"],

           topics_id:"Adjektiva = predikat langsung: 佢好靚(keoi5 hou2 leng3=dia sangat cantik). 好(hou2) sebelum adjektiva = sangat. 好食(hou2 sik6=enak), 好貴(hou2 gwai3=sangat mahal), 好平(hou2 peng4=sangat murah), 好熱(hou2 jit6=sangat panas), 好凍(hou2 dung3=sangat dingin).",topics_en:"Adjective = direct predicate: 佢好靚(keoi5 hou2 leng3=she's very pretty). 好(hou2) before adj = very. 好食(hou2 sik6=delicious), 好貴(hou2 gwai3=very expensive), 好平(hou2 peng4=very cheap), 好熱(hou2 jit6=very hot), 好凍(hou2 dung3=very cold).",

           topics_id:"喺(hai2=di/berada di): 喺邊度?(hai2 bin1 dou6?=di mana?). 上面(soeng6 min6=di atas), 下面(haa6 min6=di bawah), 入面(jap6 min6=di dalam), 出面(ceot1 min6=di luar), 隔離(gaak3 lei4=di sebelah). 喺學校入面(hai2 hok6 haau6 jap6 min6=di dalam sekolah).",topics_en:"喺(hai2=at/in/on/be at): 喺邊度?(hai2 bin1 dou6?=where?). 上面(soeng6 min6=above), 下面(haa6 min6=below), 入面(jap6 min6=inside), 出面(ceot1 min6=outside), 隔離(gaak3 lei4=next to). 喺學校入面(at school inside=inside the school).",

    CURRICULA[lang.id] = generateGenericCurriculum(lang.name);
  }
});

// ============================================================
// STATE
// ============================================================
let curLangId = 'spanish';
let curLevel = 'A1';
let curSublevel = 'A1.1';
let curSession = null;
let isDark = false;

function getLang() { return LANGUAGES.find(l=>l.id===curLangId) || LANGUAGES[0]; }
function getCurriculum() { return CURRICULA[curLangId] || CURRICULA['spanish']; }
function getLevels() { return Object.keys(getCurriculum().levels); }
function getSublevels() { return Object.keys(getCurriculum().levels[curLevel]||{}); }
function getSubData() { return getCurriculum().levels[curLevel]?.[curSublevel] || {}; }
function getSessions() { return getSubData().sessions || []; }
function tx(obj,id_key,en_key) { return uiLang==='id' ? (obj[id_key]||obj[en_key]||'') : (obj[en_key]||obj[id_key]||''); }

// ============================================================
// RENDER
// ============================================================
function renderHeader() {
  const lang = getLang();
  const cur = getCurriculum();
  const totalSessions = getLevels().reduce((a,lv)=>{
    return a + Object.values(cur.levels[lv]||{}).reduce((b,sl)=>b+(sl.sessions||[]).length,0);
  },0);
  document.getElementById('curHeader').innerHTML = `
    <div class="cur-title">
      <span class="cur-flag">${lang.flag}</span>
      <span class="cur-name">${uiLang==='id'?(lang.label_id||lang.name):lang.name}</span>
    </div>
    <div class="cur-desc">${uiLang==='id'?'Program kurikulum komprehensif berbasis CEFR':'Comprehensive CEFR-based curriculum program'}</div>
    <div class="cur-stats">
      <span class="stat-chip">4 ${t('levels')}</span>
      <span class="stat-chip">12 ${t('sublevels')}</span>
      <span class="stat-chip">${totalSessions} ${t('sessions_total')}</span>
      <span class="stat-chip">${lang.native}</span>
    </div>`;
  document.getElementById('curLangFlag').textContent = lang.flag;
  document.getElementById('curLangName').textContent = uiLang==='id'?(lang.label_id||lang.name):lang.name;
}

function renderLevelTabs() {
  document.getElementById('levelTabs').innerHTML = getLevels().map(lv=>{
    const active = lv===curLevel ? ` act-${lv}` : '';
    return `<button class="level-tab${active}" onclick="selectLevel('${lv}')">${lv} — ${lv==='A1'?(uiLang==='id'?'Pemula':'Beginner'):lv==='A2'?(uiLang==='id'?'Dasar':'Elementary'):lv==='B1'?(uiLang==='id'?'Menengah':'Intermediate'):(uiLang==='id'?'Menengah Atas':'Upper Intermediate')}</button>`;
  }).join('');
}

function renderSublevels() {
  const sub = getSubData();
  document.getElementById('sublevelRow').innerHTML = getSublevels().map(sl=>{
    const s = getCurriculum().levels[curLevel][sl];
    const active = sl===curSublevel ? ` act-${curLevel}` : '';
    return `<button class="sub-btn${active}" onclick="selectSublevel('${sl}')">${sl}: ${tx(s,'title_id','title_en')}</button>`;
  }).join('');
}

function renderMeta() {
  const sub = getSubData();
  document.getElementById('metaBar').innerHTML = `
    <span class="meta-chip">${uiLang==='id'?'Fokus':'Focus'}: ${tx(sub,'focus_id','focus_en')}</span>
    <span class="meta-chip">${sub.duration||8} ${t('weeks')}</span>
    <span class="meta-chip">16 ${uiLang==='id'?'sesi':'sessions'}</span>`;
}

const accentColor = {A1:'#D85A30',A2:'#BA7517',B1:'#3B6D11',B2:'#185FA5'};

function renderSessions() {
  const sessions = getSessions();
  document.getElementById('sessionsGrid').innerHTML = sessions.map((s,i)=>{
    const active = curSession===i;
    const border = active ? `border:1.5px solid ${accentColor[curLevel]};` : '';
    const title = uiLang==='id'?(s.title_id||s.title_en):( s.title_en||s.title_id);
    return `<div class="session-card" style="${border}" onclick="selectSession(${i})">
      <div class="session-num">${t('session')} ${i+1}</div>
      <div class="session-title">${title}</div>
      <div class="session-tags">${(s.tags||[]).map(tg=>`<span class="tag">${tg}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

// Merge LANG_GRAMMAR_NOTES into individual curricula sessions where not already detailed
// This enriches the generateGenericCurriculum with real grammar content
function enrichCurriculumWithGrammar() {
  Object.keys(LANG_GRAMMAR_NOTES).forEach(langId => {
    const notes = LANG_GRAMMAR_NOTES[langId];
    if (!CURRICULA[langId]) return;
    Object.keys(notes).forEach(level => {
      const levelNotes = notes[level];
      if (!CURRICULA[langId].levels[level]) return;
      Object.keys(levelNotes).forEach(sublevel => {
        const slNote = levelNotes[sublevel];
        const sl = CURRICULA[langId].levels[level][sublevel];
        if (!sl) return;
        // Apply grammar note to sublevel
        if (slNote.grammar_id) { sl.grammar_id = slNote.grammar_id; sl.grammar_en = slNote.grammar_en; }
        // Apply vocab sample to first session if it exists
        if (slNote.vocab_sample && sl.sessions && sl.sessions[0]) {
          sl.sessions[0].vocab_id = slNote.vocab_sample.join(', ');
          sl.sessions[0].vocab_en = slNote.vocab_sample.join(', ');
        }
      });
    });
  });
}

function parseVocabPills(vocabStr) {
  // Parse comma-separated vocab items into pill components
  if (!vocabStr) return '';
  const items = vocabStr.split(',').map(v=>v.trim()).filter(Boolean);
  if (items.length === 0) return '';
  return `<div class="vocab-grid">${items.map(item => {
    // Try to split "word (translation)" or "word=translation"
    const m = item.match(/^(.+?)\s*[\(（](.+?)[\)）]\s*$/);
    if (m) {
      return `<div class="vocab-pill">${m[1].trim()}<span class="vocab-native">${m[2].trim()}</span></div>`;
    }
    return `<div class="vocab-pill">${item}</div>`;
  }).join('')}</div>`;
}

function renderGrammarBox(grammarStr) {
  if (!grammarStr) return '';
  // Highlight patterns inside backticks or → or = 
  const formatted = grammarStr
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/→/g, '<span style="color:#2ABFBF">→</span>')
    .replace(/([A-Z]{2,}:)/g, '<strong>$1</strong>');
  return `<div class="grammar-box"><div class="grammar-rule">${formatted}</div></div>`;
}

  const sub = getSubData();

  const progress = Math.round(((curSession+1)/totalSess)*100);
  const title = uiLang==='id'?(s.title_id||s.title_en):(s.title_en||s.title_id);
  const objectives = uiLang==='id'?(s.objectives_id||s.objectives_en):(s.objectives_en||s.objectives_id);
  const topics = uiLang==='id'?(s.topics_id||s.topics_en):(s.topics_en||s.topics_id);
  const vocabRaw = uiLang==='id'?(s.vocab_id||s.vocab_en):(s.vocab_en||s.vocab_id);

  const scriptTipHTML = scriptTip ? `

  panel.innerHTML = `

        <div class="dp-label">${t('objectives')}</div>
        <div class="dp-content">${objectives}</div>
      </div>

        <div class="dp-label">${t('topics')}</div>

      <div class="dp-section">
        <div class="dp-label">${t('grammar')} <span style="font-size:10px;color:var(--text-3);font-weight:400;margin-left:4px;">(${uiLang==='id'?'Sublevel':'Sublevel'} ${curSublevel})</span></div>

        <span style="font-size:12px;color:var(--text-3);margin-left:8px;">${progress}%</span>
      </div>

}

function closeDetail() { curSession=null; renderSessions(); renderDetail(); }

function render() {

const GROUPS_ORDER = ['global','european','middle_east','asian','african','central_asian','indonesian','courses','special'];

function buildLangList(filter='') {
  const grouped = {};
  LANGUAGES.forEach(l => {
    const name = uiLang==='id' ? (l.label_id||l.name) : l.name;
    const native = l.native || '';
    const search = (name+native+l.id).toLowerCase();
    if (filter && !search.includes(filter.toLowerCase())) return;
    if (!grouped[l.group]) grouped[l.group] = [];
    grouped[l.group].push(l);
  });
  let html = '';
  GROUPS_ORDER.forEach(grp => {
    if (!grouped[grp]||!grouped[grp].length) return;
    const label = GROUP_LABELS[uiLang][grp] || grp;
    html += `<span class="lang-group-label">${label}</span>`;
    grouped[grp].forEach(l => {
      const name = uiLang==='id' ? (l.label_id||l.name) : l.name;
      const badge = l.badge ? `<span class="lang-badge ${l.badge}">${l.badge}</span>` : '';
      html += `<div class="lang-item${l.id===curLangId?' active':''}" onclick="selectLanguage('${l.id}')">
        <span class="lang-flag">${l.flag}</span>
        <span class="lang-name">${name}</span>
        <span class="lang-native">${l.native}</span>
        ${badge}
      </div>`;
    });
  });
  document.getElementById('langList').innerHTML = html || '<div style="padding:8px;color:var(--text-3);font-size:13px;">No results</div>';
}

function toggleLangDropdown() {
  const dd = document.getElementById('langDropdown');
  const ov = document.getElementById('overlay');
  const isOpen = dd.classList.contains('open');
  if (isOpen) { dd.classList.remove('open'); ov.classList.remove('open'); }
  else { dd.classList.add('open'); ov.classList.add('open'); buildLangList(); document.getElementById('langSearch').focus(); }
}
function closeLangDropdown() {
  document.getElementById('langDropdown').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function filterLangs() { buildLangList(document.getElementById('langSearch').value); }
function selectLanguage(id) {
  curLangId = id;
  curLevel = 'A1';
  const subs = Object.keys(getCurriculum().levels['A1']||{});
  curSublevel = subs[0]||'A1.1';
  curSession = null;
  closeLangDropdown();
  render();
}

// Share button in header
function getShareURL() {
  return window.location.origin + '/silabus?lang=' + curLangId;
}
function copyShareLink() {
  const url = getShareURL();
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareBtn');
    btn.textContent = '✅ Link disalin!';
    setTimeout(() => { btn.textContent = '🔗 Share Link'; }, 2000);
  });
}

// Inject share button after render
const origRender = render;
render = function() {
  origRender();
  const topRight = document.querySelector('.topbar-right');
  if (topRight && !document.getElementById('shareBtn')) {
    const btn = document.createElement('button');
    btn.id = 'shareBtn';
    btn.className = 'btn-icon share-btn';
    btn.textContent = '🔗 Share Link';
    btn.onclick = copyShareLink;
    btn.style.cssText = 'font-size:11px;padding:5px 10px;cursor:pointer';
    topRight.insertBefore(btn, topRight.firstChild);
  }
};
